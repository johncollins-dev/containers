services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: ${UID}:${GID}
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    networks:
      - proxy
    volumes:
      - ./config:/config
      - ./cache:/cache
      - type: bind
        source: ${MEDIA_PATH}
        target: /media
        read_only: true
    restart: 'unless-stopped'

networks:
  proxy:
    external: true
