services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    networks:
      - proxy
    volumes:
      - ./config:/config
      - ./config:/cache
      - type: bind
        source: /mnt/pool/Multimedia
        target: /media
        read_only: true
    restart: 'unless-stopped'

networks:
  proxy:
    external: true
