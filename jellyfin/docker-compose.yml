services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - /home/john/containers/jellyfin/config:/config
      - /home/john/containers/jellyfin/cache:/cache
      - type: bind
        source: /mnt/pool/Multimedia
        target: /media
        read_only: true
      - type: bind
        source: /path/to/fonts
        target: /usr/local/share/fonts/custom
        read_only: true
    restart: 'unless-stopped'
